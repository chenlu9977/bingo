<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7/5 考前衝刺賓果系統</title>
    <style>
        :root {
            --primary-color: #d4af37;
            --bg-color: #fdf6e3;
            --cell-done: #88aa88;
            --cell-pending: #ffffff;
            --text-color: #5d4037;
        }
        body { font-family: sans-serif; background-color: var(--bg-color); display: flex; flex-direction: column; align-items: center; padding: 20px; color: var(--text-color); }
        .date-display { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; color: var(--primary-color); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 90vw; max-width: 350px; min-height: 350px; margin-bottom: 20px; }
        .cell { background: var(--cell-pending); border: 2px solid var(--primary-color); border-radius: 8px; display: flex; justify-content: center; align-items: center; text-align: center; padding: 10px; font-size: 14px; cursor: pointer; min-height: 100px; position: relative; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .cell.completed { background: var(--cell-done); color: white; text-decoration: line-through; }
        .edit-icon { position: absolute; top: 5px; right: 5px; font-size: 14px; color: var(--primary-color); padding: 5px; }
        .section { width: 90vw; max-width: 350px; background: white; padding: 15px; border-radius: 10px; margin-top: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h3 { margin-top: 0; border-left: 4px solid var(--primary-color); padding-left: 10px; font-size: 16px; }
        .stat-item { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; padding-bottom: 5px; border-bottom: 1px dashed #eee; }
        .action-btn { margin-top: 10px; padding: 15px; background: var(--primary-color); border: none; color: white; border-radius: 5px; font-weight: bold; width: 100%; cursor: pointer; }
        .reward-input-group { display: flex; align-items: center; margin-bottom: 8px; font-size: 13px; }
        .reward-input-group label { width: 80px; }
        .reward-input-group input { flex-grow: 1; padding: 5px; border: 1px solid #ddd; border-radius: 4px; }
        .history-bar { display: flex; align-items: center; margin-bottom: 8px; }
        .bar-bg { flex-grow: 1; height: 10px; background: #eee; border-radius: 5px; margin: 0 10px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--cell-done); transition: width 0.3s; }
    </style>
</head>
<body>

    <div class="date-display" id="todayDate"></div>
    <div class="grid" id="bingoGrid"></div>

    <div style="width: 100%; max-width: 350px; text-align: center;">
        <p>今日進度: <span id="doneCount">0</span> / 9 | 連線數: <span id="lineCount">0</span></p>
        <button class="action-btn" onclick="manualSave()">✅ 結算今日進度 (不重置格子)</button>
    </div>

    <div class="section">
        <h3>🎁 自定義賓果獎勵</h3>
        <div id="rewardSettings"><div id="lineRewards"></div><div class="reward-input-group"><label><b>九宮格全滿</b></label><input type="text" id="reward-full" onchange="saveRewards()"></div></div>
    </div>

    <div class="section">
        <h3>🏆 累計成就榜 (總次數)</h3>
        <div id="taskStatsList"></div>
    </div>

    <div class="section">
        <h3>📊 每日趨勢</h3>
        <div id="historyList"></div>
    </div>

    <script>
        window.onload = function() {
            const todayStr = new Date().toLocaleDateString();
            document.getElementById('todayDate').innerText = "📅 " + todayStr;

            let tasks = JSON.parse(localStorage.getItem('bingoTasks')) || Array(9).fill("新任務");
            let status = JSON.parse(localStorage.getItem('bingoStatus')) || new Array(9).fill(false);
            let syncedStatus = JSON.parse(localStorage.getItem('syncedStatus')) || new Array(9).fill(false);
            let history = JSON.parse(localStorage.getItem('bingoHistory')) || [];
            let taskStats = JSON.parse(localStorage.getItem('taskStats')) || {};
            let rewards = JSON.parse(localStorage.getItem('bingoRewards')) || { lines: Array(8).fill("小獎勵"), full: "大獎勵" };

            const lineRewardsDiv = document.getElementById('lineRewards');
            for(let i=1; i<=8; i++) {
                lineRewardsDiv.innerHTML += `<div class="reward-input-group"><label>${i} 條線</label><input type="text" id="reward-line-${i}" value="${rewards.lines[i-1]}" onchange="saveRewards()"></div>`;
            }
            document.getElementById('reward-full').value = rewards.full;

            window.saveRewards = function() {
                for(let i=1; i<=8; i++) rewards.lines[i-1] = document.getElementById(`reward-line-${i}`).value;
                rewards.full = document.getElementById('reward-full').value;
                localStorage.setItem('bingoRewards', JSON.stringify(rewards));
            };

            function checkLines() {
                const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                let count = 0;
                wins.forEach(c => { if(status[c[0]] && status[c[1]] && status[c[2]]) count++; });
                return count;
            }

            function render() {
                const grid = document.getElementById('bingoGrid');
                grid.innerHTML = '';
                let done = 0;
                tasks.forEach((text, i) => {
                    const cell = document.createElement('div');
                    cell.className = `cell ${status[i] ? 'completed' : ''}`;
                    cell.innerHTML = `<span>${text}</span><div class="edit-icon">✎</div>`;
                    cell.onclick = function() {
                        const oldL = checkLines();
                        status[i] = !status[i];
                        const newL = checkLines();
                        if (status.every(s => s === true)) alert("✨【九宮格大滿貫】✨\n" + rewards.full);
                        else if (newL > oldL) alert(`🎉 達成 ${newL} 條連線！\n獎勵：${rewards.lines[newL-1]}`);
                        localStorage.setItem('bingoStatus', JSON.stringify(status));
                        render();
                    };
                    cell.querySelector('.edit-icon').onclick = (e) => {
                        e.stopPropagation();
                        const v = prompt("修改:", tasks[i]);
                        if(v) { 
                            tasks[i] = v; 
                            syncedStatus[i] = false;
                            localStorage.setItem('bingoTasks', JSON.stringify(tasks)); 
                            localStorage.setItem('syncedStatus', JSON.stringify(syncedStatus));
                            render(); 
                        }
                    };
                    grid.appendChild(cell);
                    if(status[i]) done++;
                });
                document.getElementById('doneCount').innerText = done;
                document.getElementById('lineCount').innerText = checkLines();
                renderTaskStats();
                renderHistory();
            }

            function processEndOfDay(dateLabel, clearGrid) {
                status.forEach((isDone, index) => {
                    if(isDone && !syncedStatus[index]) {
                        const name = tasks[index];
                        taskStats[name] = (taskStats[name] || 0) + 1;
                        syncedStatus[index] = true;
                    }
                });

                const doneCount = status.filter(s => s).length;
                if (history.length > 0 && history[0].date === dateLabel) {
                    history[0].count = doneCount;
                } else {
                    history.unshift({ date: dateLabel, count: doneCount });
                }
                if (history.length > 30) history.pop();

                localStorage.setItem('taskStats', JSON.stringify(taskStats));
                localStorage.setItem('bingoHistory', JSON.stringify(history));
                localStorage.setItem('syncedStatus', JSON.stringify(syncedStatus));
                
                if (clearGrid) {
                    status = new Array(9).fill(false);
                    syncedStatus = new Array(9).fill(false);
                    localStorage.setItem('bingoStatus', JSON.stringify(status));
                    localStorage.setItem('syncedStatus', JSON.stringify(syncedStatus));
                }
            }

            function renderTaskStats() {
                const list = document.getElementById('taskStatsList');
                list.innerHTML = '';
                Object.entries(taskStats).sort((a,b)=>b[1]-a[1]).forEach(([n, c]) => {
                    list.innerHTML += `<div class="stat-item"><span>${n}</span><span style="color:#88aa88;font-weight:bold">${c} 次</span></div>`;
                });
            }

            function renderHistory() {
                const list = document.getElementById('historyList');
                list.innerHTML = '';
                history.slice(0, 5).forEach(item => {
                    const per = (item.count / 9) * 100;
                    list.innerHTML += `<div class="history-bar"><div style="font-size:10px; width:65px">${item.date}</div><div class="bar-bg"><div class="bar-fill" style="width:${per}%"></div></div><div style="font-size:10px; width:20px">${item.count}</div></div>`;
                });
            }

            window.manualSave = function() {
                const done = status.filter(s=>s).length;
                if(done === 0) { alert("目前沒有完成任何格子喔！"); return; }
                processEndOfDay(todayStr, false); // false = 不清空內容
                alert(`✅ 結算成功！\n目前的成就已存入紀錄，您可以繼續完成剩餘格子。`);
                render();
            };

            let lastOpen = localStorage.getItem('lastOpenDate');
            if (lastOpen && lastOpen !== todayStr) {
                processEndOfDay(lastOpen, true); // 只有跨日才會自動清空 (true)
                localStorage.setItem('lastOpenDate', todayStr);
            }
            localStorage.setItem('lastOpenDate', todayStr);

            render();
        };
    </script>
</body>
</html>
